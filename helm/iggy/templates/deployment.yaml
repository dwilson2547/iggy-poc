apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iggy.fullname" . }}
  labels:
    {{- include "iggy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "iggy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "iggy.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "iggy.serviceAccountName" . }}
      {{- if or .Values.podSecurityContext .Values.securityContext.seccompUnconfined }}
      securityContext:
        {{- if .Values.securityContext.seccompUnconfined }}
        seccompProfile:
          type: Unconfined
        {{- end }}
        {{- with .Values.podSecurityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: tcp
              containerPort: {{ .Values.service.tcpPort }}
              protocol: TCP
          env:
            - name: IGGY_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "iggy.secretName" . }}
                  key: username
            - name: IGGY_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "iggy.secretName" . }}
                  key: password
            - name: IGGY_HTTP_ENABLED
              value: {{ .Values.iggy.httpEnabled | quote }}
            - name: IGGY_HTTP_ADDRESS
              value: {{ .Values.iggy.httpAddress | quote }}
            - name: IGGY_TCP_ENABLED
              value: {{ .Values.iggy.tcpEnabled | quote }}
            - name: IGGY_TCP_ADDRESS
              value: {{ .Values.iggy.tcpAddress | quote }}
            - name: IGGY_QUIC_ENABLED
              value: {{ .Values.iggy.quicEnabled | quote }}
            {{- with .Values.iggy.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "iggy.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
